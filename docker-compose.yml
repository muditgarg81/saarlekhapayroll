version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: saarlekha_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: saarlekha123
      POSTGRES_DB: saarlekha_payroll
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saarlekha_redis
    ports:
      - '6379:6379'

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: saarlekha_api
    environment:
      DATABASE_URL: postgresql://postgres:saarlekha123@postgres:5432/saarlekha_payroll
      JWT_SECRET: saarlekha-jwt-super-secret-change-in-prod
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: saarlekha_web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  pgdata:
